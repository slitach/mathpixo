<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathpixo - Pricing Plans & Affordable Math OCR Subscriptions</title>
    <meta name="description" content="View affordable subscriptions for Mathpixo, the ultimate Math OCR tool. Subscriptions starting at just $2.99/mo for 6,000 image & PDF formula conversions.">
    <meta name="keywords" content="math ocr pricing, image to latex cost, mathpix alternative pricing, cheap math ocr, formula converter subscriptions, student discount latex ocr">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mathpixo - Pricing Plans & Subscriptions">
    <meta property="og:description" content="Affordable Math OCR plans starting at just $2.99/mo. Convert images, screenshots, and PDFs of mathematical equations into LaTeX.">
    <meta property="og:url" content="https://mathpixo.com/pricing.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Base Stylesheet for variables -->
    <link rel="stylesheet" href="style.css">
    <!-- PayPal Smart Buttons SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    <style>
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            position: relative;
        }

        /* Nav Header */
        .nav-header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
            z-index: 10;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .back-link:hover {
            color: var(--primary);
            border-color: var(--primary-glow);
            background: rgba(99, 102, 241, 0.08);
            transform: translateX(-3px);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .logo-text h1 span {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Header Intro */
        .pricing-header {
            text-align: center;
            max-width: 700px;
            margin-bottom: 3.5rem;
            z-index: 10;
        }

        .pricing-header h2 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .pricing-header p {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.6;
        }

        /* Toggle Button styling */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 4rem;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 0.35rem;
            border-radius: 50px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.55rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .discount-badge {
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
        }

        /* Pricing Grid */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 4rem;
            z-index: 10;
        }

        /* Pricing Card */
        .pricing-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2.25rem 1.75rem;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .pricing-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        /* Highlighted Pro Card */
        .pricing-card.highlighted {
            border: 2px solid var(--primary);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.15);
        }

        .pricing-card.highlighted:hover {
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.25);
            border-color: var(--primary);
        }

        /* Icon Badge */
        .plan-icon-container {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .icon-free {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .icon-pro {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .icon-org {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .icon-enterprise {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }

        /* Plan Labels */
        .plan-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .plan-tag.highlight-tag {
            color: var(--primary);
        }

        .plan-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.75rem;
        }

        .plan-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
            min-height: 42px;
        }

        /* Pricing Section */
        .price-container {
            margin-bottom: 2rem;
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
        }

        .price-currency {
            font-size: 1.75rem;
            font-weight: 700;
            color: #ffffff;
        }

        .price-value {
            font-size: 2.75rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .price-period {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Feature List */
        .feature-list {
            list-style: none;
            margin-bottom: 2.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .feature-item {
            font-size: 0.9rem;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .feature-item i {
            color: var(--primary);
            font-size: 0.85rem;
            width: 14px;
        }

        .feature-item.accent-check i {
            color: var(--accent);
        }

        /* Action Buttons */
        .plan-btn {
            width: 100%;
            padding: 0.85rem;
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .plan-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .plan-btn.btn-outline {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-main);
        }

        .plan-btn.btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .plan-btn.btn-accent {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Background Effects */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .pricing-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
        }

        @media (max-width: 650px) {
            .pricing-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .pricing-header h2 {
                font-size: 2.25rem;
            }
            body {
                padding: 1.5rem 1rem;
            }
        }
    <script src="translate.js"></script>
</head>
<body>
    <!-- Background glowing elements -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="bg-grid"></div>

    <!-- Navigation Header -->
    <header class="nav-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo-section">
            <i class="fa-solid fa-square-root-variable logo-icon" style="font-size: 1.75rem;"></i>
            <div class="logo-text">
                <h1>Mathpix<span>o</span></h1>
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem; align-items: center;">
            <!-- Language Selector Dropdown -->
            <div class="lang-selector-container">
                <button class="btn-lang-toggle" id="langToggleBtn" title="Change Language" style="background: transparent; border: 1px solid var(--card-border); color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.65rem; border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.35rem; outline: none; transition: var(--transition-smooth); background: rgba(255, 255, 255, 0.02);" onmouseover="this.style.borderColor='var(--primary)'; this.style.color='#fff';" onmouseout="this.style.borderColor='var(--card-border)'; this.style.color='var(--text-muted)';">
                    <i class="fa-solid fa-globe"></i>
                    <span id="currentLangCode" style="font-weight: 700; text-transform: uppercase;">EN</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i>
                </button>
                <div class="lang-dropdown hidden" id="langDropdown" style="top: calc(100% + 8px);">
                    <button class="lang-opt" data-lang="en">English</button>
                    <button class="lang-opt" data-lang="fr">Français</button>
                    <button class="lang-opt" data-lang="es">Español</button>
                    <button class="lang-opt" data-lang="ar">العربية</button>
                </div>
            </div>

            <a href="workspace.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> <span data-i18n="back_workspace">Workspace</span>
            </a>
        </div>
    </header>

    <!-- Header Description -->
    <section class="pricing-header">
        <h2 data-i18n="pricing_title">Mathpixo Snip Pricing</h2>
        <p data-i18n="pricing_subtitle">Simple, transparent pricing for turning handwritten equations and technical documents into perfect digital formats.</p>
    </section>

    <!-- Toggle Billing -->
    <div class="toggle-container">
        <button class="toggle-btn active" id="btnMonthly" data-i18n="monthly">Monthly</button>
        <button class="toggle-btn" id="btnYearly">
            <span data-i18n="yearly">Yearly</span> <span class="discount-badge" data-i18n="save_percent">Save ~20%</span>
        </button>
    </div>

    <!-- Pricing Cards Grid -->
    <main class="pricing-grid">
        
        <!-- Card 1: Free -->
        <div class="pricing-card">
            <div class="plan-icon-container icon-free">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <span class="plan-tag" data-i18n="occasional_use">For occasional use</span>
            <h3 class="plan-name" data-i18n="free_plan">Free & Educational</h3>
            <p class="plan-desc" data-i18n="students_users">For students and everyday users.</p>
            
            <div class="price-container">
                <span class="price-value" id="priceFree">Free</span>
            </div>
            
            <ul class="feature-list">
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 10 PDF pages/month</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 10 images/month</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 2x usage with .edu email</li>
            </ul>
            
            <a href="workspace.html" class="plan-btn btn-outline" data-i18n="get_started">Get Started</a>
        </div>

        <!-- Card 2: Pro (Highlighted) -->
        <div class="pricing-card highlighted">
            <div class="plan-icon-container icon-pro">
                <i class="fa-solid fa-rocket"></i>
            </div>
            <span class="plan-tag highlight-tag">Great Value</span>
            <h3 class="plan-name" data-i18n="pro_plan">Pro</h3>
            <p class="plan-desc" data-i18n="students_users">For students, teachers, and STEM professionals.</p>
            
            <div class="price-container">
                <span class="price-currency" id="currencyPro">$</span>
                <span class="price-value" id="pricePro">2.99</span>
                <span class="price-period" id="periodPro">/mo</span>
            </div>
            
            <ul class="feature-list">
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 1,000 PDF pages/month</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 5,000 images/month</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> High priority AI rendering</li>
            </ul>
            
            <button class="plan-btn" id="btnBuyPro" data-i18n="get_started">Get Started</button>
        </div>

        <!-- Card 3: Organization -->
        <div class="pricing-card">
            <div class="plan-icon-container icon-org">
                <i class="fa-solid fa-users"></i>
            </div>
            <span class="plan-tag" data-i18n="for_teams">For Teams</span>
            <h3 class="plan-name" data-i18n="org_plan">Organization</h3>
            <p class="plan-desc" data-i18n="teams_desc">For departments, schools, and companies.</p>
            
            <div class="price-container">
                <span class="price-currency" id="currencyOrg">$</span>
                <span class="price-value" id="priceOrg">6.99</span>
                <span class="price-period" id="periodOrg">/mo</span>
            </div>
            
            <ul class="feature-list">
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 1,000 PDF pages per user/month</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 5,000 images per user/month</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> 2 users included</li>
            </ul>
            
            <button class="plan-btn btn-outline" id="btnBuyOrg" data-i18n="get_started">Get Started</button>
        </div>

        <!-- Card 4: Enterprise -->
        <div class="pricing-card">
            <div class="plan-icon-container icon-enterprise">
                <i class="fa-solid fa-building"></i>
            </div>
            <span class="plan-tag" data-i18n="enterprise">Enterprise</span>
            <h3 class="plan-name" data-i18n="enterprise">Enterprise/Institutional</h3>
            <p class="plan-desc" data-i18n="enterprise_desc">For organizations needing a flexible, long-term solution.</p>
            
            <div class="price-container">
                <span class="price-value" id="priceEnterprise">Custom</span>
            </div>
            
            <ul class="feature-list">
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> Custom pricing</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> Streamlined registration</li>
                <li class="feature-item"><i class="fa-regular fa-circle-check"></i> Dedicated support</li>
            </ul>
            
            <a href="mailto:sales@mathpixo.com?subject=Enterprise Inquiry" class="plan-btn btn-outline btn-accent" style="border-color: var(--accent);" data-i18n="contact_sales">Contact Sales</a>
        </div>

    </main>

    <!-- Checkout Modal -->
    <div class="modal-overlay hidden" id="checkoutModal">
        <div class="auth-modal-card glass-card" style="text-align: center;">
            <button class="modal-close-btn" id="closeCheckoutBtn">&times;</button>
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff;" data-i18n="confirm_upgrade">Confirm Upgrade</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;" data-i18n="secure_checkout">Secure checkout with PayPal</p>
            
            <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); padding: 1.25rem; border-radius: 12px; margin-bottom: 2rem; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span style="font-weight: 500; color: var(--text-muted); font-size: 0.9rem;">Plan:</span>
                    <span style="font-weight: 600; color: #fff; font-size: 0.9rem;" id="checkoutPlanName">Pro Plan</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span style="font-weight: 500; color: var(--text-muted); font-size: 0.9rem;">Billing:</span>
                    <span style="font-weight: 600; color: #fff; font-size: 0.9rem;" id="checkoutBillingCycle">Monthly</span>
                </div>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 0.75rem 0;">
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-weight: 600; color: #fff; font-size: 1rem;" data-i18n="total_due">Total Due:</span>
                    <span style="font-weight: 800; color: var(--accent); font-size: 1.2rem;" id="checkoutPrice">$4.99</span>
                </div>
            </div>

            <!-- PayPal Button Container -->
            <div id="paypal-button-container" style="min-height: 150px; margin-bottom: 1rem; position: relative; z-index: 100;"></div>
            
            <div class="auth-error-msg hidden" id="checkoutError" style="margin-top: 1rem;"></div>
        </div>
    </div>

    <script>
        // Interactive Toggle Scripts
        const btnMonthly = document.getElementById('btnMonthly');
        const btnYearly = document.getElementById('btnYearly');
        
        const pricePro = document.getElementById('pricePro');
        const periodPro = document.getElementById('periodPro');
        
        const priceOrg = document.getElementById('priceOrg');
        const periodOrg = document.getElementById('periodOrg');

        let billingPeriod = 'monthly';

        btnMonthly.addEventListener('click', () => {
            btnMonthly.classList.add('active');
            btnYearly.classList.remove('active');
            billingPeriod = 'monthly';
            
            // Set Monthly values
            pricePro.textContent = "2.99";
            periodPro.textContent = "/mo";
            
            priceOrg.textContent = "6.99";
            periodOrg.textContent = "/mo";
            
            updatePlanButtons();
        });

        btnYearly.addEventListener('click', () => {
            btnYearly.classList.add('active');
            btnMonthly.classList.remove('active');
            billingPeriod = 'yearly';
            
            // Set Yearly values
            pricePro.textContent = "29.90";
            periodPro.textContent = "/yr";
            
            priceOrg.textContent = "69.90";
            periodOrg.textContent = "/yr";
            
            updatePlanButtons();
        });

        // ==========================================================================
        // PayPal Checkout & User State Flow
        // ==========================================================================
        let currentUser = null;

        const checkoutModal = document.getElementById('checkoutModal');
        const closeCheckoutBtn = document.getElementById('closeCheckoutBtn');
        const checkoutPlanName = document.getElementById('checkoutPlanName');
        const checkoutBillingCycle = document.getElementById('checkoutBillingCycle');
        const checkoutPrice = document.getElementById('checkoutPrice');
        const checkoutError = document.getElementById('checkoutError');

        const btnBuyPro = document.getElementById('btnBuyPro');
        const btnBuyOrg = document.getElementById('btnBuyOrg');

        // Check if user is logged in
        async function checkUserAuth() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                currentUser = data.user;
                updatePlanButtons();
            } catch (err) {
                console.error('Failed to fetch user auth:', err);
            }
        }

        function updatePlanButtons() {
            const lang = localStorage.getItem('lang') || 'en';
            const dict = i18n[lang] || i18n.en;

            if (currentUser && currentUser.subscription && currentUser.subscription.status === 'active') {
                const activePlan = currentUser.subscription.plan;
                
                if (activePlan === 'pro') {
                    btnBuyPro.textContent = dict.active_sub;
                    btnBuyPro.disabled = true;
                    btnBuyPro.style.background = 'var(--success)';
                    btnBuyPro.style.borderColor = 'var(--success)';
                    
                    btnBuyOrg.textContent = dict.upgrade_org;
                    btnBuyOrg.disabled = false;
                } else if (activePlan === 'organization') {
                    btnBuyOrg.textContent = dict.active_sub;
                    btnBuyOrg.disabled = true;
                    btnBuyOrg.style.background = 'var(--success)';
                    btnBuyOrg.style.borderColor = 'var(--success)';
                    
                    btnBuyPro.textContent = dict.downgrade_pro;
                    btnBuyPro.disabled = false;
                }
            } else {
                btnBuyPro.textContent = dict.get_started;
                btnBuyPro.disabled = false;
                btnBuyPro.style.background = '';
                btnBuyPro.style.borderColor = '';

                btnBuyOrg.textContent = dict.get_started;
                btnBuyOrg.disabled = false;
            }
        }

        // Listen for language toggles to update dynamic plan labels
        window.addEventListener('langChanged', updatePlanButtons);

        // Open checkout flow
        function openCheckout(planName, price) {
            if (!currentUser) {
                alert('Please sign in or create an account to upgrade to a paid plan. Redirecting to sign in...');
                window.location.href = 'workspace.html?login=true';
                return;
            }

            checkoutPlanName.textContent = planName;
            checkoutBillingCycle.textContent = billingPeriod.charAt(0).toUpperCase() + billingPeriod.slice(1);
            checkoutPrice.textContent = `$${price}`;
            checkoutError.classList.add('hidden');
            
            checkoutModal.classList.remove('hidden');

            // Render PayPal smart buttons
            initPayPalButtons(planName, price);
        }

        btnBuyPro.addEventListener('click', () => {
            const price = billingPeriod === 'monthly' ? '2.99' : '29.90';
            openCheckout('Pro', price);
        });

        btnBuyOrg.addEventListener('click', () => {
            const price = billingPeriod === 'monthly' ? '6.99' : '69.90';
            openCheckout('Organization', price);
        });

        // Close modal
        closeCheckoutBtn.addEventListener('click', () => {
            checkoutModal.classList.add('hidden');
        });

        checkoutModal.addEventListener('click', (e) => {
            if (e.target === checkoutModal) {
                checkoutModal.classList.add('hidden');
            }
        });

        // PayPal Buttons Rendering
        function initPayPalButtons(planName, priceValue) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = ''; // Clear previous button rendering

            paypal.Buttons({
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            description: `Mathpixo - ${planName} Plan (${billingPeriod})`,
                            amount: {
                                currency_code: 'USD',
                                value: priceValue
                            },
                            payee: {
                                email_address: 'mrslimanetachroun@gmail.com' // Merchant account receiver email
                            }
                        }]
                    });
                },
                onApprove: async function(data, actions) {
                    return actions.order.capture().then(async function(details) {
                        try {
                            const response = await fetch('/api/user/subscribe', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    plan: planName.toLowerCase(),
                                    orderId: data.orderID
                                })
                            });

                            if (!response.ok) {
                                const errData = await response.json();
                                throw new Error(errData.error || 'Failed to upgrade profile on server.');
                            }

                            const resData = await response.json();
                            currentUser = resData.user;
                            updatePlanButtons();

                            // Display Checkout success
                            container.innerHTML = `
                                <div style="color: var(--success); padding: 1.5rem 0; text-align: center;">
                                    <i class="fa-solid fa-circle-check" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 1rem;"></i>
                                    <h3 style="font-size: 1.35rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff;">Plan Upgraded!</h3>
                                    <p style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.5;">
                                        Thank you, ${details.payer.name.given_name || 'Subscriber'}! You are now subscribed to the ${planName} plan.
                                    </p>
                                    <button class="plan-btn" style="margin-top: 1.5rem; max-width: 200px; margin-left: auto; margin-right: auto;" onclick="window.location.href='index.html'">Go to Workspace</button>
                                </div>
                            `;

                        } catch (err) {
                            console.error('Subscription error:', err);
                            checkoutError.textContent = err.message || 'Subscription failed. Contact support.';
                            checkoutError.classList.remove('hidden');
                        }
                    });
                },
                onError: function(err) {
                    console.error('PayPal Smart Button error:', err);
                    checkoutError.textContent = 'PayPal transaction could not be completed. Please check your credentials and try again.';
                    checkoutError.classList.remove('hidden');
                }
            }).render('#paypal-button-container');
        }

        // Initialize authentication
        checkUserAuth();
    </script>
</body>
</html>
